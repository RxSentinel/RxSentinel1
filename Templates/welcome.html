<!DOCTYPE html>
<html>

<head>
    <title>RxSentinel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #E3F2FD, #FFFFFF);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Background Icons */
        .bg-icons span {
            position: fixed;
            font-size: 55px;
            color: #0B3D91;
            opacity: 0.28;
            animation: appear 1s ease forwards;
        }

        .i1 {
            top: 5%;
            left: 10%;
        }

        .i2 {
            top: 10%;
            right: 15%;
        }

        .i3 {
            top: 30%;
            left: 5%;
        }

        .i4 {
            top: 40%;
            right: 8%;
        }

        .i5 {
            top: 60%;
            left: 15%;
        }

        .i6 {
            top: 70%;
            right: 12%;
        }

        .i7 {
            bottom: 15%;
            left: 5%;
        }

        .i8 {
            bottom: 10%;
            right: 18%;
        }

        .i9 {
            top: 50%;
            left: 45%;
        }

        @keyframes appear {
            from {
                opacity: 0;
                transform: scale(0.5);
            }

            to {
                opacity: 0.28;
                transform: scale(1);
            }
        }

        .box {
            text-align: center;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        h1 {
            color: #1976D2;
            font-size: 40px;
        }

        p {
            color: #0D47A1;
            margin-bottom: 30px;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: #1976D2;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0D47A1;
        }
    </style>
</head>

<body>

    <div class="bg-icons">
        <span class="i1">🩺</span>
        <span class="i2">💊</span>
        <span class="i3">💉</span>
        <span class="i4">🧬</span>
        <span class="i5">💊</span>
        <span class="i6">🩺</span>
        <span class="i7">💉</span>
        <span class="i8">🧬</span>
        <span class="i9">💊</span>
    </div>

    <div class="box">
        <h1>💊 Welcome to RxSentinel</h1>
        <p>Your Smart Drug Interaction Safety System</p>

        <form action="/home" method="GET">
            <button type="submit">Get Started →</button>
        </form>
    </div>

</body>

</html>
